<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>登录 · Nextcloud SSO</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #f0f2f5;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }
    .card {
      background: #fff;
      border-radius: 12px;
      padding: 40px 36px;
      width: 360px;
      box-shadow: 0 4px 24px rgba(0,0,0,.10);
    }
    h1 { font-size: 20px; font-weight: 600; color: #1a1a2e; margin-bottom: 6px; }
    p.sub { font-size: 13px; color: #888; margin-bottom: 28px; }
    label { display: block; font-size: 13px; color: #555; margin-bottom: 6px; }
    input[type=text], input[type=password] {
      width: 100%; padding: 10px 12px;
      border: 1px solid #d9d9d9; border-radius: 6px;
      font-size: 14px; outline: none;
      transition: border-color .2s;
    }
    input:focus { border-color: #4f46e5; }
    .field { margin-bottom: 18px; }
    .error {
      background: #fff1f0; border: 1px solid #ffa39e;
      color: #cf1322; border-radius: 6px;
      padding: 10px 12px; font-size: 13px;
      margin-bottom: 18px;
    }
    button {
      width: 100%; padding: 11px;
      background: #4f46e5; color: #fff;
      border: none; border-radius: 6px;
      font-size: 15px; font-weight: 500;
      cursor: pointer; transition: background .2s;
    }
    button:hover { background: #4338ca; }
    .hint { font-size: 12px; color: #aaa; text-align: center; margin-top: 20px; }
  </style>
</head>
<body>
  <div class="card">
    <h1>单点登录</h1>
    <p class="sub">使用系统账号登录以授权 Nextcloud</p>

    {% if error %}
    <div class="error">{{ error }}</div>
    {% endif %}

    <form method="post" action="">
      {% csrf_token %}
      <input type="hidden" name="next" value="{{ next }}" />
      <div class="field">
        <label for="username">用户名</label>
        <input id="username" type="text" name="username"
               value="{{ username }}" autocomplete="username" autofocus required />
      </div>
      <div class="field">
        <label for="password">密码</label>
        <input id="password" type="password" name="password"
               autocomplete="current-password" required />
      </div>
      <button type="submit">登录并授权</button>
    </form>
    <p class="hint">此页面仅用于 Nextcloud SSO 授权，非系统主入口。</p>
  </div>
</body>
</html>
